<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>GEMINI — 02-peace-law-gemini</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0f;color:#e0e0d8;font-family:monospace;height:100vh;display:flex;flex-direction:column}.hdr{background:#1a1a1a;color:#c9a84c;padding:10px 16px;font-size:11px;font-weight:900;text-transform:uppercase;border-bottom:2px solid #333}.main{flex:1;display:flex;overflow:hidden}.view{flex:1;display:flex;align-items:center;justify-content:center;position:relative}.view img{max-width:90%;max-height:90%}.info{position:absolute;bottom:8px;left:8px;font-size:10px;font-weight:900;background:#c9a84c;color:#000;padding:3px 8px}.side{flex:0 0 260px;display:flex;flex-direction:column;border-left:2px solid #333}.ctrl{padding:10px;border-bottom:2px solid #333}.ctrl label{font-size:9px;font-weight:900;text-transform:uppercase;display:block;margin-bottom:4px;color:#c9a84c}.ctrl input[type=range]{width:100%}.btns{display:flex;gap:4px;margin-top:6px}.btns button{flex:1;padding:8px;background:#c9a84c;color:#000;border:0;font:inherit;font-size:10px;font-weight:900;cursor:pointer}.grid{flex:1;overflow-y:auto;display:grid;grid-template-columns:repeat(5,1fr);gap:1px;padding:1px;background:#333}.grid img{width:100%;display:block;cursor:pointer;background:#111}.grid img.on{outline:2px solid #c9a84c}</style></head><body>
<div class="hdr">02-peace-law-gemini — 64 FRAMES (v7)</div>
<div class="main"><div class="view"><img id="big" src="frames/frame_000.png"><div class="info" id="lbl">0/63</div></div>
<div class="side"><div class="ctrl"><label>Frame <span id="fn">0</span>/63</label><input type="range" id="s" min="0" max="63" value="0"><div class="btns"><button onclick="prev()">◀</button><button id="pb" onclick="tp()">▶</button><button onclick="next()">▶</button></div></div>
<div class="grid" id="g"></div></div></div>
<script>var N=64,c=0,p=false,t=null,g=document.getElementById('g');for(var i=0;i<N;i++){var m=document.createElement('img');m.src='frames/frame_'+String(i).padStart(3,'0')+'.png';m.dataset.i=i;m.onclick=function(){go(+this.dataset.i)};g.appendChild(m)}function go(i){c=Math.max(0,Math.min(N-1,i));document.getElementById('big').src='frames/frame_'+String(c).padStart(3,'0')+'.png';document.getElementById('s').value=c;document.getElementById('fn').textContent=c;document.getElementById('lbl').textContent=c+'/'+(N-1);g.querySelectorAll('img').forEach(function(x,j){x.classList.toggle('on',j===c)});if(g.children[c])g.children[c].scrollIntoView({block:'nearest'})}function next(){go(c+1)}function prev(){go(c-1)}function tp(){p=!p;document.getElementById('pb').textContent=p?'⏸':'▶';if(p)t=setInterval(function(){if(c>=N-1)go(0);else next()},150);else clearInterval(t)}document.getElementById('s').oninput=function(){go(+this.value)};document.onkeydown=function(e){if(e.key==='ArrowRight')next();if(e.key==='ArrowLeft')prev();if(e.key===' '){e.preventDefault();tp()}};go(0);</script></body></html>
