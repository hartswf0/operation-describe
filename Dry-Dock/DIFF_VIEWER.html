    <script>
        const originalText = "Abstract\n\nGen AI platforms use prompts to create images, videos and interactive media. The act of prompting can be understood as a new form of ekphrasis\u2014the ancient literary practice of vivid description. The crucial difference is that unlike traditional ekphrastic poetry and prose, the ekphrasis of prompting is, as Hannes Bajohr has argued, \"operative\": the text not only describes an image but generates it, collapsing the traditional distinction between the verbal and the visual. Prompt and image together constitute an imagetext, which W.J.T. Mitchell and others have suggested has always been an imagined goal of ekphrasis. Operative ekphrasis is both familiar and radically new in the way that it configures the relationship of word and image and allows us to revisit prior notions of ekphrasis. It offers a new perspective on what Krieger called the \"illusion of the natural sign.\" It offers an alternate paradigm for ekphrastic representation\u2014a paradigm that favors process over finished product, which we characterize as \"thick prompting.\" As generative systems are being extended to create entire immersive 3D environments, the imagetext can become a worldtext, which embodies process. We explore operative ekphrasis, imagetext and worldtext with reference to what is often regarded as the first ekphrasis in Western literature: Homer's shield of Achilles.\n\nIntroduction\n\nGenerative AI systems can be used to create a variety of different media forms, including text, images, videos, program code, and interactive media. The interface for these products is typically a prompt provided or instigated ultimately by a human agent. If we focus on the systems that produce visual artifacts and the most popular systems (such as those offered by OpenAI, Google Gemini, Meta, MidJourney, and others), the most common interface remains a text prompt that produces an image (or video). Prompting has become a general practice for millions or now possibly billions of users, and the art of effective prompting is now known as promptcraft. The practice has begun to be studied (Oppenlaender et al 2024; Oppenlaender 2024; Liu and Chilton 2023), and systems have been developed that embody or improve on existing practices (Almeda 2024; Brade et al 2023). As has been noted (Bajohr 2024; Meyer 2023), this movement from text to (possibly moving) image corresponds in an almost uncanny way to ekphrasis, the traditional literary practice of vivid description.\n\nThe technology of image generation requires training a generative model on millions or billions of captioned images. The captions are a key component of the system because they allow the human users to communicate to the model what image they want produced. So the text prompt is the natural, indeed obvious interface to drive the system. When we say obvious, we do not mean to denigrate the remarkable achievements of the computer scientists who developed probabilistic generative systems. We simply mean that once they had developed the insight of tokenizing text and images and building them into a single unified system of weighted matrices, then using text prompts became the obvious interface for generating new images from the model.\n\nIt seems unlikely that any of these computer scientists thought that they were developing a new kind of ekphrasis, yet their interface happened to enact this literary practice that predates generative AI by thousands of years. And this coincidence invites us to apply literary history and aesthetic theory to one of the most remarkable developments in the history of digital media. Working from a key insight of Hannes Bajohr, we propose to explore operative ekphrasis as a means of reinterpreting traditional theories of ekphrasis.\n\nOperative Ekphrasis and the Imagetext\n\nFor the Greeks, ekphrasis was a rhetorical practice of describing a vivid visual scene. Rhetoricians, especially in the Greek-speaking parts of the Roman empire, set ekphrasis as an exercise for their students. Ekphrasis was also a generic element in their own rhetorical performances, when public speaking became a significant form of artistic performance. Authors of rhetorical treatises from the Empire period, including Theon (1st century), Hermogenes (2nd), Aphthonios (4th), and Nikolaos (5th), treat ekphrasis as the art of enargeia (Webb, 1999; Webb 2016). In the modern era, the emphasis shifted radically. As rhetorical practice and theory became less culturally important, critics and theorists focused on descriptive passages in poetry and in literary prose. In the middle of the twentieth century, the critic Leo Spitzer could simply define ekphrasis without reference to rhetoric at all as \"the poetic description of a pictorial or sculptural work of art.\" (Webb 1999, 10) This became the aesthetic framework for researchers later in the twentieth century, including Murray Krieger (1992), James Heffernan (2004[1993]), and W.J.T. Mitchell (1994). Since that time, a significant body of literature has developed (e.g. Cl\u00fcver 1997; Webb 1999; Ellestr\u00f6m 2010; Lindh\u00e9 2013; Webb 2016; Brosch 2018b), some of which has addressed the impact of the digital, including a special issue of Poetics Today edited by Renate Brosch (2018b). With the major exception of Webb, this work largely ignored that rhetorical tradition of ekphrasis, and until the 2020s, none of it took generative AI into account.\n\nHannes Bajohr was among the first literary theorists to note that the prompting of an AI image generator constituted a new form of ekphrasis. (Bajohr 2024; see also Meyer 2023) Bajohr coined the term \"operative ekphrasis\" to describe the unique capacity that gen AI systems bring to the practice. He distinguishes between the traditional computer manipulation of images and the prompting of generative models. These are performative in a new way because the models embed textual encodings into the model. These encodings are derived from text captions, descriptions, metadata associated with the image scraped from the web or elsewhere. As Bajohr emphasizes, the process of creating these models collapses in important ways the distinction between text and image, and it is this collapse that makes operative ekphrasis possible. Bajohr's notion of collapse resonates with the essay of W. J. T. Mitchell \"Ekphrasis and the Other\" in Picture Theory (1994, 151-181), long before machine learning systems were capable of image generation. Mitchell argued that the practice of ekphrasis allows us to understand the complicated and always unstable relationship between text and image. The two were never completely distinct as semiotic systems, and the potential merging of text and image could be seen both as the audacious aspiration of ekphrasis and as its nightmare. The merging would confirm the power of the verbal description to become and therefore to control the image it evokes. But, at the same time, it would threaten to dissolve the word in the image. The image would make the word unnecessary. What Mitchell calls \"imagetext\" provokes both \"ekphrastic hope\" and \"ekphrastic fear.\"\n\nImagetext as both image and text is an appropriate description of the latent space of an image generation model. In the training process, images and captions (or textual descriptions) are encoded and both contribute to the same large set of weights that constitute the model. When the training is complete, it is impossible to say which particular values constitute the text and which the images; the representations of text and images are everywhere in the latent manifold. Prompting can be understood as a process of probing the latent space (Liu and Chilton 2023; Almeda et al. 2024) to tease an image out of all the possible images in the space. The resulting image is almost never an exact replica of any of the millions or billions of images that were fed in during training; it is instead an interpolation from among the many similar images that the model has absorbed. The probabilistic nature of the process means that even the computer specialists who have created these images cannot determine exactly how any given image was created. Nevertheless, the process itself (in current systems, usually diffusion) is deterministic: a series of steps in which the system repeatedly refines the image out of an initial pattern of noise.\n\nIn generative systems, ekphrasis is a well-defined procedure. The transformation from word to image is a process. Prompting itself is often a repeated process. The prompter creates one prompt and receives one or more images. The first results are often not what the prompter wants, so they repeat the process.\n\nPrompting as Performance and Thick Description\n\nPrompting is a process, even if it involves only such cycle of word to image. In fact, the process is so simple that users seldom stop after one cycle. They either refine the first prompt or create a different image with a new prompt. While prompting may have the practical goal of producing usable images for a variety of commercial or casual purposes, the simplicity of the process vastly expands the number of those who can produce such images. The emphasis shifts to process and participation. In this way, operative ekphrasis recalls the ancient rhetorical tradition of the progymnasmata. That tradition emphasized performance. Ekphrases were designed to be part of an oration, to be delivered before an audience and appreciated in the moment. The theory of ekphrasis in the twentieth century emphasized the finished product, the poem, not the process of its making, a well-wrought urn, as critic Cleanth Brooks put it, in a reference to perhaps for the most famous English language ekphrasis, Keats' \"Ode on a Grecian Urn.\"\n\nAs ekphrastic prompting has developed into a community of practice, the way prompts are crafted has become more elaborate, for image generation as well as for text and coding. A skilled practitioner does not stop with a single short phrase. As we noted, they prompt iteratively to refine the result. In multimodal systems, prompters may deploy images to generate other images. Prompts can be data files (in json format), scripts or even code. Even before generative AI, digital media theorists were arguing for the multimodality or intermediality of digital ekphrasis (Brosch 2018b) as well as for ekphrasis as performance (Brosch 2018a). Metaprompting is already an established term for the practice of writing prompts that prompt prompts. The term and much of the research have been applied to LLMs that output verbal responses to verbal prompts (Zhang Yuan et al 2025). But metaprompting can also serve for making prompting images in two or three dimensions (Zhao et al 2024; Ceurstemont 2025).\n\nWe suggest the term \"thick prompting\" to characterize all of these practices, appealing to the anthropologist Clifford Geertz's concept of \"thick description\" from this introductory essay to his book The Interpretation of Cultures (Geertz 1993 [1973]). Geertz rejected anthropological theories that reduced cultural complexities to functional formulas. He argued for a process of description that acknowledges the complex structures of meaning behind any cultural practice. That complexity means that descriptions need to be \"thick\": there is always more to say. The process is provisional and potentially endless. Good prompting is also thick. Both thick description and thick prompting are seeking to engage with layers of coding. In the case of thick description, it is the layers of cultural coding that overdetermine any practice. In the case of thick prompting, the coding consists of all the semantic layers that have been absorbed into the weights of the model. To prompt is to probe those layers in order to tease out the artifact. Because the models are probabilistic (not the symbolically coded knowledge structures of earlier AI), the process of interrogating them is always approximate, incomplete, and potentially endless. There is no final perfect prompt.\n\n\n\n\n\nThick prompting is not about length. It is about pressure. A thin prompter names a subject and trusts the defaults. But defaults are what Meyer (2025) calls \"platform realism\" and Steyerl (2023) calls the \"mean image\" \u2014 the statistical memory of a training corpus shaped by the visual conventions and economic incentives of the platforms that host it. Simonen et al. (2026) demonstrate this empirically: when prompts fail to grip the system, default images recur across unrelated inputs. The archive always goes first.\n\nA thick prompter gives the system enough organized constraint to move the result toward a specific world of relations. The thick prompter prunes the default. Oppenlaender (2022\u20132024) documents this pruning as a co-creative ecosystem of iterative experimentation. PromptMagician (Lin et al., 2024) formalizes the diagnostic cycle: users inspect returned images, identify where the model defaulted toward a stock solution, and compose the next prompt against what they learned. Crucially, all prompting occurs through an interface, whether the prompter designed it or not. The interface dictates the affordances. A prompt does not simply conjure an image from the void; it acts upon a language model functioning as a compiler\u2014a *forge*\u2014which must translate semantic intention into executable code or structural constraints to finally render the visual output.\n\nThe prompter enters an archive by giving it a symptom, disturbing what it already carries. The ancient orator and the modern prompter face the same design problem: both must produce verbal input that activates a shared representation \u2014 cultural memory in the first case, statistical memory in the second \u2014 to generate a vivid output. To describe is to undergo the pressure of a reality that resists easy formulation. To generate is to produce probable continuations from learned patterns (cf. Geertz, 1973; Wiener, 1948). Both Homer and the generative model inherit constraints, but only the poet can suffer them. Thick prompting imports the cost of description into the generative apparatus.\n\nThe image is not the product. The image is feedback \u2014 a diagnostic return from behind a gate the prompter cannot see through (cf. Oppenlaender, 2024b). Thick prompting names this unfinished condition: ekphrasis after the image has become feedback.\n\nThe Shield as Performance and Process\n\nHomer's description of the making of a new shield for Achilles in the Iliad (Book 18. 478\u2013608) is often invoked as the classical example of literary ekphrasis. We propose to use Homer's text to illustrate how operative ekphrasis follows the tradition of ekphrasis and how it diverges. Interestingly for our purposes, Homer's passage prefigures a quality of operative ekphrasis mentioned above. As Lessing and later critics pointed out (Lessing 2022 [1766]; Taplin 1980), instead of describing the finished object, Homer describes how the god Hephaestus fashions the shield, scene by scene, as each is located in a different sector. That Homer described the process of making as it unfolds in time was an important point for Lessing who argued in Laocoon that poetry is a temporal medium.\n\nThe emphasis on craft and process also make it tempting to read Homer's description as an allegory for the craft of oral poetry. Just as Hephaestus is crafting a world out of bronze, tin and gold, so Homer is creating not only Hephaestus' shield but the whole of the Iliad from his materials. Homer's materials are the words and formulaic expressions of his oral tradition\u2014expressions developed to suit the requirements of epic verse (dactylic hexameter) while at the same time capturing essential qualities of the characters and elements of that imagined world (swift-footed Achilles, Hector of the shining helmet, the wine-dark sea, and so on). Classicists still debate the question of how the Iliad was transmitted as a written text, but most agree that it arose from a long tradition of oral performance. (cf. Lord 2018 [1960]) The formulaic system enables the poet to perform the story before an audience in \"real-time.\" The oral theory of Homeric composition, proposed by Milman Parry and elaborated by A.B. Lord (Lord 2018 [1960]), has sometimes been (mis)interpreted and critiqued as a deterministic explanation of composition. Homeric scholars today emphasize the craft of Homeric poetry was never a simple matter of dropping the right formulae into the right slot. Homeric poetry could not be fashioned by a deterministic (procedural) algorithm. On the other hand, we propose this analogy (not equivalence): that Homeric oral poetry can itself be thought of as a generative system. The system was evolved over generations by poets who fashioned formulaic epithets that suited the metrical constraints as well as larger and less constrained formulae for scenes and episodes. A poet trained in the system can then generate a story that is in the appropriate meter but also with the appropriate elements that formed the Homeric world. The process was not deterministic, but it was probabilistic. No two tellings Achilles' wrath would be line for line the same, but all of them would evoke that same Homeric world of gods and heroes, combat scenes, and formulaic epithets, such as bright-eyed Athena and rosy-fingered dawn. Homer's ekphrasis of the shield was already in this sense produced operatively.\n\nThe Shield and the Natural Sign\n\nIn the ancient tradition, an ekphrasis is successful if the verbal description can call forth a clear and vivid image in the listener's or reader's mind. The word aspires to become an image. As we noted above, this aspiration is what Mitchell termed \"ekphrastic hope.\" As Krieger put it, the verbal description would become a \"natural sign,\" as a picture was assumed to be. He added: \"The narrow, literal doctrine of ekphrasis would seem to require this primitive notion of the pictorial as the naively representational.\" (Krieger, 12, n12) That is, the image called forth would be in a style of pictorial realism. Krieger may have characterized the view as naive or primitive, but it remains popular. The generative platforms agree. Since pictorial and photographic realism are richly represented in the data that the visual models scrape from the Internet, it is not surprising that an operative ekphrasis can often produce a realistic image of Achilles' shield or the scenes depicted on it. In fact, when prompted accordingly, the principal generative AI systems (e.g. from OpenAI, Gemini, and MidJourney) are all capable of a variety of styles, but they will default to a small range of popular styles depending on the subject matter and the prompting.\n\nPrompting with the Homeric text does in fact typically produce images in the tradition of realism in western painting or photorealism in computer graphics. As a test, we used Google's image generator Gemini 3 Flash. Our prompt was: \"Create the shield described below. Make the image as faithful and detailed as possible\", and we included in the prompt the entire Homeric passage (Book 18, lines 478\u2013608) in the original Greek. The model had no trouble with the Greek. The prompt produced a pair of images of a round bronze shield whose raised figures correspond in general terms, though not perfectly, to the scenes described in the passage. (Fig 1) The style defaulted to something between a realistic painted image and a photograph. Further text prompting could likely get closer to depicting every scene if not every detail of the verbal original. The prompts would start from the original image and call for corrections and additions. Such iteration is the most common method of thickening a prompt.\n\nThat prompt produced the shield as a whole object. A possible next step would be to pursue the logic of immersion by inviting the viewer into an individual scene on the shield. Immersion is, after all, a popular digital aesthetic in this age of videogames and computer-generated special effects in film. In this case, we focused on the vineyard scene (18.561-572) with the prompt: \"Create the scene described below. Make the image as faithful and detailed as possible\" followed by the excerpt in Greek. (Fig 2) The result was a representation in linear perspective and a style reminiscent of an illustrated children's book of the mid-twentieth century. It looks like an illustration of a child's version of the Bible. The generative models are trained on a vast number of images with text captions or annotations from the corpus of human production, so they tend to styles that our visual culture associates with the ancient world, in books and movies in particular.\n\nAs noted above, the various models have somewhat different qualities within the general rubric of (photo)realism. For example, OpenAI's GPT Image series is considered better at executing details of the prompt; whereas Midjourney excels at cinematic effects. Gemini's platform gives rapid and fairly accurate results. Beyond these differences, though, there is a common aesthetic that Roland Meyer (2025) and others have characterized as \"platform realism.\" The images have a generic or \"average\" character (Hintze et al, 2026). They are in a literal sense averages, as they are interpolations from the numerical values assigned to the images on which the model was trained. Steyerl (2023) calls them \"mean\" images. Meyer further notes that the images are nostalgic in a postmodern way, expressive not of a longing for the past but for a sense of pastness. The models could have come by this postmodern aesthetic honestly in the sense that they have devoured large numbers of postmodern art as well. Generative AI produces images of images, not the natural sign. We could say that what AI shows is a nostalgia for the natural sign.\n\nThe Shield as Worldtext\n\nAs classic scholars have remarked, the shield occupies a position both within and beyond the narrative of the poem. The Iliad is a story from the Trojan War, itself an exceptional event, and that story unfolds in the course of weeks in the tenth and final year of that war. The shield does not directly refer to those events at all; instead, it depicts the whole Homeric world: from the sky and constellations in the center to the Ocean that surrounds the world on the shield's rim. In between are scenes of the range of human activity: peace and war, agriculture, a legal dispute, wedding and festive dancing. (Taplin 1980) The shield offers a picture of the variety and equilibrium of this world of gods and humans\u2014a picture that contrasts vividly with the disorder and conflict that is the story of Achilles's withdrawal and return to battle. The shield is a detail in that story of conflict, but in describing the scenes on the shield in such detail (over 130 lines) Homer reverses macro- and microcosm: the Trojan War is a moment in the Greek epic universe but Homer renders that universe on this shield inside that moment. The description of the shield is ekphrasis. It is imagetext. But we choose it because it also suggests the ekphrastic ambition to encompass a world. We use the shield to gesture to the various senses of worldtext that we propose to explore.\n\nPrior to the development of generative platforms, decades of research and design in computer graphics, particularly for video games, clearly indicated a cultural desire to move beyond two dimensions. Screen-based games offered players the opportunity to explore 3D game worlds, and then the arrival of inexpensive virtual reality headsets in the 2010s seems to fulfill the promise that the player would be able to enter into such worlds. But those worlds were created by teams of graphics experts and programmers and offered to the player to explore. Now Google Deepmind with its Genie series and World Labs with Marble are offering generative platforms through which a user can bring forth their own 3D world from a text or other prompt. The ambition is to make the worlds produced fully interactive and malleable. The player-user could potentially type or speak a new prompt and change their world in real-time. The imagetext is reimagined as a worldtext. Ekphrastic hope here extends beyond the word as natural sign to something like a neoplatonic faith in the power of the word, here the prompt, to create a world.\n\nThick prompting is a key aspect of these world model generators. Even if the user or player provide only a short verbal prompt (e.g. \"Make a Homeric world like the one depicted on the shield of Achilles\"), the generator depends on an elaborate set of so-called system prompts that provide context to guide and constrain the model (not to mention a great deal of sophisticated procedural programming to provide the physics and interactivity).\n\n\n\n\n\nIf operative ekphrasis collapses word and image, and if the natural sign is revealed as a platform average, then the shield demands a different kind of attention. The Shield of Achilles should not enter this argument as a famous example. It should enter as the model.\n\nThe decisive shift is from depicting a scene to specifying a world. In generative AI research, this is the distinction between an *image model* and a *world model*. An image has no consequences. A world does. A world model is a predictive engine: a compressed spatiotemporal representation of how states succeed one another and how environments respond to intervention (Ha and Schmidhuber, 2018). Crucially, Ha and Schmidhuber's architecture comprises three core components: a Vision model that compresses observations into compact latent vectors, a Memory model that predicts future states as probability distributions, and a Controller that maps current vision and memory states to action. Homer's shield anticipates this tripartite structure. The visual descriptions of the metalwork parallel the Vision model, providing the sensory surface. The procedural algorithms of the harvest, the battle, and the trial function as the Memory model, predicting how the environment changes over time. The warrior who carries the shield, or the audience who visualizes it, functions as the Controller, learning to navigate the complexities of mortal life by exploring the world the artifact generates.\n\nGoogle DeepMind (Genie 2; Bruce et al., 2024) and World Labs have already produced navigable, interactive environments from text prompts \u2014 the ekphrastic object is no longer flat. Moretti (1996) had already named this ambition in his reading of the epic, calling it directly a \"world text\" \u2014 a textual artifact compressing a totality of social relations onto a single bounded surface. Image generation asked: what can a sentence make visible? World generation asks: what can a sentence make habitable?\n\nAs Taplin (1980) demonstrated, war is the plot; the shield is the counter-plot \u2014 the life Achilles will defend, destroy, and never fully inhabit. It contains marriage, law, agriculture, dance, and cosmic boundary. Its scenes unfold: the procession moves, the dancers turn, the armies clash. Time enters quietly; then the picture is no longer a picture.\n\nThe shield's structure matters more than its surface. Cosmology at center, Ocean at rim, human society organized between \u2014 the architecture is rule-governed, not merely decorative. Its visual richness \u2014 golden vines, silver fish, dancers in fine linen \u2014 serves the rules, not the other way around. In the terminology of recent AI research, the shield is a neurosymbolic hybrid (cf. Garcez and Lamb, 2023): current world models exhibit the same structure, generating surfaces probabilistically while relying on deterministic engines for physics and spatial consistency.\n\nWe observe this neurosymbolic resonance empirically across three compilation architectures. The first is *Hephaestus-OS*, an operative grid mapping Homer's semantic zones directly onto WebGL geometry. But more revealing are the cases of LDraw and B-flix (Hartsoe 2024), where the prompt proves it can act as both surface and structure. In our synthesis of the shield, the text is divided into six zones (e.g., *The Construction and Cosmic Design*, *The Two Cities*). Each passage is passed to an LLM functioning as an animation compiler, which translates the ekphrasis into deterministic B-flix dot-matrix code (`PNT`, `LIN`, `REC` commands). When rendered through the ABC-Flix engine, it produces a raw animated contact sheet. Crucially, this code-generated output is then fed *back* into a vision model (Gemini 3 Flash Image) alongside the original Homeric text to be refined into a legible, temporal cartoon sequence. \n\nThe prompt becomes the image, but the same prompt also acts as the code to make the image. System prompt and user prompt together form the constitution of the worldtext. The prompt functions not as a sovereign command but as a control signal (cf. Wiener, 1948) \u2014 one regulatory input among many, collaborating with training data, safety filters, physics engines, and procedural rules. Worldtext names this hanging-together.\n\nA world is not a larger image. A world is an image with rules, memory, and consequence. Without consequence, worldtext is only scenery with ambition.\n\nConclusion\n\nThe word has always wanted to make an image \u2014 Mitchell's (1994) \"ekphrastic hope\" \u2014 and the image has always wanted to become a world. Now that desire has a platform.\n\nThis paper has traced a single operation across three thresholds. The first threshold is ancient: the *progymnasmata* taught students to perform language that produces visual experience. That threshold was concealed by the modern narrowing of ekphrasis from production to representation and recovered by Bajohr's concept of operative ekphrasis. The second threshold is contemporary: generative AI materializes the ekphrastic operation computationally, collapsing word and image into the latent space of a multimodal model. The third threshold is emergent: as generative systems move from image models to world models, operative ekphrasis extends beyond the image and toward the environment.\n\nBut the fantasy remains unstable. The prompt does not become a natural sign. The world that emerges is not pure creation but sediment \u2014 platformed, shaped by the descriptions that trained it. The promise of presence and the promise of habitation are, as Davis (2015) argues, theological in disguise. The politics of a worldtext will appear not in its explicit content but in its affordances: what it allows, what it remembers, what it makes easy, what it makes impossible, what it treats as natural, and what it renders unthinkable. Homer's shield already stages this. What is present \u2014 marriage, law, agriculture, dance \u2014 is a claim about what belongs together. What is absent \u2014 slavery, disease, famine \u2014 is a claim about what the available grammar renders unimaginable.\n\nThe image is the first diagnostic return. The world model is the greenhouse becoming walkable. Once the image can be entered, the old question returns in a harsher form: what kind of life has the description authorized?\n\nHuman beings once asked language to preserve the world. Now they ask language to generate one. The wish has changed less than we think.";
        const modifiedText = "From Imagetext to Worldtext: Generative AI as Operative Ekphrasis\nBy Watson Hartsoe & Jay David Bolter\nGeorgia Institute of Technology\n\nAbstract\n\tGenerative AI platforms use prompts to create images, videos and interactive media. The act of prompting can be understood as a new form of ekphrasis\u2014the ancient literary practice of vivid description. The crucial difference is that unlike traditional ekphrastic poetry and prose, the ekphrasis of prompting is, as Hannes Bajohr has argued, \u201coperative\u201d: the text not only describes an image but generates it, collapsing the traditional distinction between the verbal and the visual. Prompt and image together constitute an imagetext, which W.J.T. Mitchell and others have suggested has always been an imagined goal of ekphrasis. Operative ekphrasis is both familiar and radically new in the way that it configures the relationship of word and image and allows us to revisit prior notions of ekphrasis. It offers a new perspective on what Krieger called the \"illusion of the natural sign.\u201d It offers an alternate paradigm for ekphrastic representation\u2014a paradigm that favors process over finished product. As generative systems are being extended to create entire immersive 3D environments, the imagetext can become a worldtext, in which the ekphrasis calls forth a world model rather than an image. We explore operative ekphrasis, imagetext and worldtext with reference to what is often regarded as the first ekphrasis in Western literature: Homer\u2019s description of the shield of Achilles.\nIntroduction\n\nGenerative AI systems can be used to create a variety of different media forms, including text, images, videos, program code, and interactive media. The interface for these products is typically a prompt provided or instigated ultimately by a human agent. If we focus on the systems that produce visual artifacts and the most popular systems (such as those offered by OpenAI, Google, MidJourney, and others),  the most common interface remains a text  prompt that produces an image (or video). Prompting has become a general practice for millions or now possibly billions of users, and the art of effective prompting is now known as promptcraft. The practice has begun to be studied (Oppenlaender, Linder, and Silvennoinen 2024; Oppenlaender 2024; Liu and Chilton 2023), and systems have been developed that embody or improve on existing practices (Almeda et al. 2024; Brade et al. 2023). As has been noted (Bajohr 2024; Meyer 2023), this movement from text to (possibly moving) image corresponds in a surprising way to ekphrasis, the traditional literary practice of vivid description. \nThe technology of image generation requires training a generative model on millions or billions of captioned images. The captions are a key component of the system because they allow the human users to communicate to the model what image they want produced. So the text prompt is the natural, indeed obvious interface to drive the system. When we say obvious, we do not mean to denigrate the remarkable achievements of the computer scientists who developed probabilistic generative systems. We simply mean that once they had developed the insight of tokenizing text and images and building them into a single unified system of weighted matrices, then using text prompts became the obvious interface for generating new images from the model. \nIt seems unlikely that any of these computer scientists thought that they were developing a new kind of ekphrasis, yet their interface happened to enact this literary practice that predates generative AI by thousands of years. And this coincidence invites us to apply literary history and aesthetic theory to one of the most remarkable developments in the history of digital media. Working from a key insight of Hannes Bajohr, we propose to explore operative ekphrasis as a means of reinterpreting traditional theories of ekphrasis.\nOperative ekphrasis and the Imagetext\nFor the Greeks, ekphrasis was a rhetorical practice of describing a vivid visual scene. Rhetoricians, especially in the Greek-speaking parts of the Roman Empire, set ekphrasis as an exercise for their students. Ekphrasis was also a generic element in their own rhetorical performances, when public speaking became a significant form of artistic performance. Authors of rhetorical treatises from the Empire period treat ekphrasis as the art of enargeia (Webb 1999; Webb 2016). In the modern era, the emphasis shifted radically. As rhetorical practice and theory became less culturally important, critics and theorists focused on descriptive passages in poetry and in literary prose. In the middle of the twentieth century, the critic Leo Spitzer could simply define ekphrasis without reference to rhetoric at all as \u201cthe poetic description of a pictorial or sculptural work of art.\u201d (Webb 1999, 10) This became the aesthetic framework for researchers later in the twentieth century, including Murray Krieger (1992), James Heffernan (2004[1993]), and W.J.T. Mitchell (1994). Since that time, a significant body of literature has developed (e.g. Cl\u00fcver 1997; Webb 1999; Ellestr\u00f6m 2010; Lindh\u00e9 2013; Webb 2016; Brosch 2018b), some of which has addressed the impact of the digital, including a special issue of Poetics Today edited by Renate Brosch (2018b). With the major exception of Webb, this work largely ignored that rhetorical tradition of ekphrasis, and until the 2020s, none of it took generative AI into account.\n\nHannes Bajohr was among the first literary theorists to note that the prompting of an AI image constituted a new form of ekphrasis. (Bajohr 2024; see also Meyer 2023)  Bajohr coined the term \u201coperative ekphrasis\u201d  to describe the unique capacity that gen AI systems bring to the practice. He distinguishes between the traditional computer manipulation of images and the prompting of generative models. These are performative in a new way because the models embed textual encodings into the model. These encodings are derived from text captions, descriptions, metadata associated with the image scraped from the web or elsewhere. As Bajohr emphasizes, the process of creating these models collapses in important ways the distinction between text and image, and it is this collapse that makes operative ekphrasis possible. Bajohr\u2019s notion of collapse resonates with the essay by W. J. T. Mitchell entitled \u201cEkphrasis and the Other\u201d in Picture Theory (1994, 151-181), long before machine learning systems were capable of image generation. Mitchell argued that the practice of ekphrasis allows us to understand the complicated and always unstable relationship between text and image. The two were never completely distinct as semiotic systems, and the potential merging of text and image could be seen both as the audacious aspiration of ekphrasis and as its nightmare.  The merging would confirm the power of the verbal description to become and therefore to control the image it evokes. But, at the same time, it would threaten to dissolve the word in the image. The image would make the word unnecessary. What Mitchell calls \u201cimagetext\u201d provokes both \u201cekphrastic hope\u201d and \u201cekphrastic fear.\u201d \n\nImagetext as both image and text is an appropriate description of the latent space of an image generation model. In the training process, images and captions (or textual descriptions) are encoded and both contribute to the same large set of weights that constitute the model. When the training is complete, it is impossible to say which particular values constitute the text and which the images; the representations of text and images are everywhere in the latent manifold. Prompting can be understood as a process of probing the latent space (Liu and Chilton 2023; Almeda et al. 2024) to tease an image out of all the possible images in the space. The resulting image is almost never an exact replica of any of the millions or billions of images that were fed in during training; it is instead an interpolation from among the many similar images that the model has absorbed. The probabilistic nature of the process means that even the computer specialists who have created these images cannot determine exactly how any given image was created. Nevertheless, the process itself (in current systems, usually diffusion) is deterministic: a series of steps in which the system repeatedly refines the image out of an initial pattern of noise. \nIn generative systems, ekphrasis is a well-defined procedure. The transformation from word to image is a process. Prompting itself is often a repeated process. The prompter creates one prompt and receives one or more images. The first results are often not what the prompter wants, so they repeat the process. \n \nPrompting as performance and thick description \n\nPrompting is a process, even if it involves only one such cycle of word to image. In fact, the process is so simple that users seldom stop after one cycle. They either refine the first prompt or create a different image with a new prompt. While prompting may have the practical goal of producing usable images for a variety of commercial or casual purposes, the simplicity of the process vastly expands the number of those who can produce such images. The emphasis shifts to process and participation. In this way, operative ekphrasis recalls the ancient rhetorical tradition of the progymnasmata. That tradition emphasized performance. Ekphrases were designed to be part of an oration, to be delivered before an audience and appreciated in the moment. The theory of ekphrasis in the twentieth century emphasized the finished product, the poem, not the process of its making, a well-wrought urn, as critic Cleanth Brooks put it, in a reference to perhaps the most famous English language ekphrasis, Keats\u2019 \u201cOde on a Grecian Urn.\u201d\n\nAs ekphrastic prompting has developed into a community of practice, the way prompts are crafted has become more elaborate, for image generation as well as for text and coding. A skilled practitioner does not stop with a single short phrase. As we noted, they prompt iteratively to refine the result. In multimodal systems, prompters may deploy images to generate other images. Prompts can be data files (in JSON format), scripts or even code. Even before generative AI, digital media theorists were arguing for the multimodality or intermediality of digital ekphrasis (Brosch 2018b) as well as for ekphrasis as performance (Brosch 2018a).  Metaprompting is already an established term for the practice of writing prompts that prompt prompts. The term and much of the research have been applied to LLMs that output verbal responses to verbal prompts (Zhang, Yuan, and Yao 2025) . But metaprompting can also serve for making images in two or three dimensions (Zhao et al. 2024; Ceurstemont 2025).\n\nWe suggest the term \u201cthick prompting\u201d to characterize all of these practices, appealing to the anthropologist Clifford Geertz\u2019s concept of \u201cthick description\u201d from the introductory essay to his book The Interpretation of Cultures (Geertz 1993 [1973]). Geertz rejected anthropological theories that reduced cultural complexities to functional formulas. He argued for a process of description that acknowledges the complex structures of meaning behind any cultural practice. That complexity means that descriptions need to be \u201cthick\u201d: there is always more to say. The process is provisional and potentially endless. Good prompting is also thick. Both thick description and thick prompting are seeking to engage with layers of coding. In the case of thick description, it is the layers of cultural coding that overdetermine any practice. In the case of thick prompting, the coding consists of all the semantic layers that have been absorbed into the weights of the model. To prompt is to probe those layers in order to tease out the artifact. Because the models are probabilistic (not the symbolically coded knowledge structures of earlier AI), the process of interrogating them is always approximate, incomplete, and potentially endless. There is no final perfect prompt.\nThe shield of Achilles as performance and process\nHomer\u2019s description of the making of a new shield for Achilles in the Iliad (Book 18.478\u2013608). is often invoked as the classical example of literary ekphrasis. We propose to use Homer\u2019s text to illustrate how operative ekphrasis follows the tradition of ekphrasis and how it diverges. Interestingly for our purposes, Homer\u2019s passage prefigures a quality of operative ekphrasis mentioned above. As Lessing and later critics pointed out (Lessing 2022 [1766]; Taplin 1980),  instead of describing the finished object, Homer describes how the god Hephaestus fashions the shield, scene by scene, as each is located in a different sector. That Homer described the process of making as it unfolds in time was an important point for Lessing, who argued in Laocoon that poetry is a temporal medium. \n\nThe emphasis on craft and process also makes it tempting to read Homer\u2019s description as an allegory for the craft of oral poetry. Just as Hephaestus is crafting a world out of bronze, tin, and gold, so Homer is creating not only Hephaestus's shield but the whole of the Iliad from his materials. Homer\u2019s materials are the words and formulaic expressions of his oral tradition\u2014expressions developed to suit the requirements of epic verse (dactylic hexameter) while at the same time capturing essential qualities of the characters and elements of that imagined world (swift-footed Achilles, Hector of the shining helmet, the wine-dark sea, and so on). Classicists still debate the question of how the Iliad was transmitted as a written text, but most agree that it arose from a long tradition of oral performance. [citation?] The formulaic system enables the poet to perform the story before an audience in \u201creal-time.\u201d The oral theory of Homeric composition, proposed by Milman Parry and elaborated by A.B. Lord (Lord 2018 [1960]), has sometimes been (mis)interpreted and critiqued as a deterministic explanation of composition. Homeric scholars today emphasize the craft of Homeric poetry was never a simple matter of dropping the right formulae into the right slot. Homeric poetry could not be fashioned by a deterministic (procedural) algorithm. On the other hand, we propose this analogy (not equivalence): that Homeric oral poetry can itself be thought of as a generative system. The system was evolved over generations by poets who fashioned formulaic epithets that suited the metrical constraints as well as larger and less constrained formulae for scenes and episodes. A poet trained in the system can then generate a story in the appropriate meter but also with the appropriate elements that formed the Homeric world. The process was not deterministic, but it was probabilistic. No two tellings of Achilles\u2019 wrath would be line for line the same, but all of them would evoke that same Homeric world of gods and heroes, combat scenes, and formulaic  epithets, such as bright-eyed Athena and rosy-fingered dawn. Homer\u2019s ekphrasis of the shield was already in this sense produced operatively. \n\nThe shield and the natural sign\nIn the ancient tradition, an ekphrasis is successful if the verbal description can call forth a clear and vivid image in the listener\u2019s or reader\u2019s mind. The word aspires to become an image. As we noted above, this aspiration is what Mitchell termed \u201cekphrastic hope.\u201d As Krieger put it, the verbal description would become a \"natural sign,\u201d as a picture was assumed to be. He added: \u201cThe narrow, literal doctrine of ekphrasis would seem to require this primitive notion of the pictorial as the naively representational.\u201d(Krieger 1992, 12, n12) That is, the image called forth would be in a style of pictorial realism. Krieger may have characterized the view as naive or primitive, but it remains popular. The generative platforms agree. Since pictorial and photographic realism are richly represented in the data that the visual models scrape from the Internet, it is not surprising that an operative ekphrasis can often produce a realistic image of Achilles\u2019 shield or the scenes depicted on it.  In fact, when prompted accordingly, the principal generative AI systems (e.g. from OpenAI, Gemini, and MidJourney) are all capable of a variety of styles, but they will default to a small range of popular styles depending on the subject matter and the prompting. \n\nPrompting with the Homeric text does in fact typically produce images in the tradition of realism in western painting or photorealism in computer graphics. As a test, we used Google\u2019s image generator Gemini 3 Flash Image. Our prompt was: \u201dCreate the shield described below. Make the image as faithful and detailed as possible\u201d, and we included in the prompt the entire Homeric passage (Book 18, lines 478\u2013608) in the original Greek. The model had no trouble with the Greek. The prompt produced a pair of images of a round bronze shield whose raised figures correspond in general terms, though not perfectly, to the scenes described in the passage. (Fig. 1) The style defaulted to something between a realistic painted image and a photograph. Further text prompting could likely get closer to depicting every scene if not every detail of the verbal original. The prompts would start from the original image and call for corrections and additions. Such iteration is the most common method of thickening a prompt. For comparison we gave the same prompt \u201cCreate the shield\u2026\u201d together with the Greek text to ChatGPT Images 2.0. The result was a similar aesthetic, although this system decided to give us only one image and it divided the scenes on the shield differently (Fig. 2). \n\nWith the above prompt, both Gemini 3 Flash Image and ChatGPT Images 2.0 created a whole shield as a plausible object with the various scenes embossed on it. A possible next step would be to pursue the logic of immersion by prompting the systems to envision a single scene as a pictorial space.This turned out to be easy with Gemini. We focused on the vineyard scene (18.561-572). We offered the prompt: \u201cCreate the scene described below. Make the image as faithful and detailed as possible\u201d followed by the excerpt in Greek. Gemini produced a representation in linear perspective and a style reminiscent of an illustrated children\u2019s book of the mid-twentieth century. It looks like an illustration of a child\u2019s version of the Bible. (Fig. 3) The generative models are trained on a vast number of images with text captions or annotations from the corpus of human production, so they tend to styles that our visual culture associates with the ancient world, in books and movies in particular. We had to prompt ChatGPT twice. When we used the same prompt as with Gemini, it created an image of the vineyard scene that had some qualities of perspective but whose figures were still bronzed. (Fig. 4) So we refined the prompt with the instruction: \u201cMake the scene in a realistic style using linear perspective. That is, take us into the scene.\u201d  The result maintained almost exactly the same composition, but with a more painterly style. (Fig 5).  It is interesting that ChatGPT chose to represent only young women with the exception of lyre-playing young man, although the text specifies individuals of both sexes. The figures in the Gemini version are boys and girls, whereas the ChatGPT version gives us significantly older female figures. The style in ChatGPT does not recall an illustration from a child\u2019s Bible, but perhaps the academic neoclassism of the nineteenth century. \nAs this example indicates, the various models may have different emphases within the general rubric of realism or photorealism. Beyond these differences, though, there is a common aesthetic that Roland Meyer (2025) and others have characterized as \u201cplatform realism.\u201d The images have a generic or \u201caverage\u201d character (Hintze et al. 2026). They are in a literal sense averages, as they are interpolations from the numerical values assigned to the images on which the model was trained. Steyerl (2023) calls them \u201cmean\u201d images. Meyer further notes that the images are nostalgic in a postmodern way, expressive not of a longing for the past but for a sense of pastness. The models could have come by this postmodern aesthetic honestly in the sense that they have devoured large amounts of postmodern art as well. Generative AI produces images of images. Its results are not expressions of the natural sign. We could say instead that such AI images depict a nostalgia for the natural sign. \n\nThe shield as worldtext\nAs classical scholars have remarked, the shield occupies a position both within and beyond the narrative of the poem. The Iliad is a story from the Trojan War, itself an exceptional event, and that story unfolds in the course of weeks in the tenth and final year of that war. The shield does not directly refer to those events at all, but instead depicts the whole Homeric world: from the sky and constellations in the center to the Ocean that surrounds the world on the shield\u2019s rim. In between are scenes of the range of human activity: peace and war, agriculture, a legal dispute, wedding and festive dancing. (Taplin 1980) The shield offers a picture of the variety and equilibrium of this world of gods and humans\u2014a picture that contrasts vividly with the disorder and conflict that is the story of Achilles\u2019s withdrawal and return to battle. The shield is a detail in that story of conflict, but while describing the scenes on the shield in such detail Homer reverses macro- and microcosm: the Trojan War is a moment in the Greek epic universe but Homer renders that universe on this shield inside that moment. The description of the shield suggests an ekphrastic ambition to encompass a world. It gestures beyond imagetext to what we might call worldtext. \nPrior to the development of generative platforms, screen-based games offered players the opportunity to explore 3D game worlds, and the arrival of inexpensive virtual reality headsets in the 2010s seemed to fulfill the promise that the player would be able to enter into such worlds. But those worlds had to be created by teams of graphics experts and programmers and then offered to the player to explore. Now Google DeepMind with its Genie series (Bruce et al. 2024) and World Labs with Marble are beginning to offer generative platforms through which a user can create their own 3D world from a text or other prompt. As the Genie website puts it: \u201cGenie 3 is a general-purpose world model. It uses simple text descriptions to generate photorealistic environments that can be explored in real-time.\u201d (https://deepmind.google/models/genie/) Thick prompting is a key aspect of world model generators.  Even if the user or player provides only a short verbal prompt (e.g. \u201cMake a Homeric world like the one depicted on the shield of Achilles\u201d), the generator depends on elaborate unseen system prompts that provide context to guide and constrain the model. Some world generating systems also depend on sophisticated procedural programming to provide the physics and interactivity. \nThe ambition is to make the worlds produced fully interactive and malleable. The player-user could type or speak a new prompt and change their world in real-time. Ekphrastic hope here reaches beyond the word as natural sign to a neoplatonic affirmation of the power of the word/prompt to create the world.  The decisive shift here is from depicting a scene to specifying a world. In generative AI research, this is the distinction between an image model and a world model. An image has no consequences. A world does. A world model is a predictive engine: a compressed spatiotemporal representation of how states succeed one another and how environments respond to intervention (Ha and Schmidhuber, 2018). In this sense, a world is not a larger image; a world is an image with rules, memory, and consequence. \nAs these systems develop and become available for artists and gamers, their expressive potential and limits should become clearer. It seems likely that they will follow the path of the 2D image and video generators in converging to a series of generic and average artifacts, e.g. user-generated game worlds that resemble the ones now available in the desktop and VR videogames. As with the 2D systems, however, creative individuals will have a new medium to explore and for which to devise new genres. It is already the case that these AI generative systems have done for ekphrasis what the invention of the simple box camera did for photography at the turn of the twentieth century: that is, they greatly expand the number of those with the ability to make images. Operative ekphrasis is now a media form practiced by millions of individuals each day. As with other mass digital media, we can expect the quality of the results to range from mediocre to truly surprising. \n\nReferences\n\nAlmeda, Shm Garanganao, J.D. Zamfirescu-Pereira, Kyu Won Kim, Pradeep Mani Rathnam, and Bjoern Hartmann. 2024. \u201cPrompting for Discovery: Flexible Sense-Making for AI Art-Making with Dreamsheets.\u201d Proceedings of the CHI Conference on Human Factors in Computing Systems, May 11, 1\u201317. https://doi.org/10.1145/3613904.3642858.\n\nBajohr, Hannes. 2024. \u201cOperative Ekphrasis: The Collapse of the Text/Image Distinction in Multimodal AI.\u201d Word & Image 40 (2): 77\u201390. https://doi.org/10.1080/02666286.2024.2330335.\n\nBrade, Stephen, Bryan Wang, Mauricio Sousa, Sageev Oore, and Tovi Grossman. 2023. \u201cPromptify: Text-to-Image Generation through Interactive Prompt Exploration with Large Language Models.\u201d Proceedings of the 36th Annual ACM Symposium on User Interface Software and Technology, October 29, 1\u201314. https://doi.org/10.1145/3586183.3606725.\n\nBrosch, Renate. 2018a. \u201cEkphrasis in the Digital Age.\u201d  In \"Ekphrasis Today,\" edited by Renate Brosch, Poetics Today 39 (2): 225\u201343. https://doi.org/10.1215/03335372-4324420.\n\nBrosch, Renate, ed. 2018b. \"Ekphrasis Today.\" Special issue, Poetics Today 39, no. 2 (June).\n\nBruce, Jake, Michael D. Dennis, Ashley Edwards, et al. 2024. \u201cGenie: Generative Interactive Environments.\u201d Paper presented at Forty-first International Conference on Machine Learning. June 6. https://openreview.net/forum?id=bJbSbJskOS.\n\nCeurstemont, Sandrine. 2025. \u201cAutomating Tools for Prompt Engineering.\u201d Communications of the ACM 68 (05): 15\u201317. https://doi.org/10.1145/3715703.\n\nCl\u00fcver, Claus. \u201cEkphrasis Reconsidered: On Verbal Representations of Non-Verbal Texts.\u201d In Interart Poetics, edited by Ulla-Britta Lagerroth, Hans Lund, and Erik Hedling. Rodopi, 1997.\n\nEllestr\u00f6m, L., ed. Media Borders, Multimodality and Intermediality. 2010 edition. Palgrave Macmillan, 2010.\n\nGeertz, Clifford. 1993. The Interpretation of Cultures. Fontana Press.\n\nHa, David, and J\u00fcrgen Schmidhuber. 2018. World Models. March 28. https://doi.org/10.5281/zenodo.1207631.\n\nHeffernan, James A. W. 2004. Museum of Words: The Poetics of Ekphrasis from Homer to Ashbery. University of Chicago Press.\n\nHintze, Arend, Frida Proschinger \u00c5str\u00f6m, and Jory Schossau. 2026. \u201cAutonomous Language-Image Generation Loops Converge to Generic Visual Motifs.\u201d Patterns 7 (1): 101451. https://doi.org/10.1016/j.patter.2025.101451.\n\nKrieger, Murray. 1992. Ekphrasis: The Illusion of the Natural Sign. Johns Hopkins University Press. https://doi.org/10.1353/book.68495.\n\nLessing, Gotthold. Laoco\u00f6n: The Limits of Poetry and Painting. Edited by David Payne. Translated by Richard Phillimore, Ellen Frothingham, and William Ross. Random Shack, 2022.\n\nLindh\u00e9, Cecilia. 2013. \u201cA Visual Sense Is Born in the Fingertips: Towards a Digital Ekphrasis.\u201d Digital Humanities Quarterly 007 (1).\n\nLord, Albert B. 2018. The Singer of Tales: Third Edition. Edited by David F. Elmer. Center for Hellenic Studies.\n\nLiu, Vivian, and Lydia B. Chilton. 2023. \u201cDesign Guidelines for Prompt Engineering Text-to-Image Generative Models.\u201d arXiv:2109.06977. Preprint, arXiv, September 28. https://doi.org/10.48550/arXiv.2109.06977.\n\nMeyer, Roland. 2025. \u201c\u2018Platform Realism\u2019. AI Image Synthesis and the Rise of Generic Visual Content.\u201d Transbordeur 9. https://doi.org/10.4000/13dwq.\n\nMeyer, Roland. 2023. The New Value of the Archive: AI Image Generation and the Visual Economy of \u2018Style.\u2019 https://doi.org/10.25969/MEDIAREP/22314.\n\nMitchell  1994. Picture Theory\n\nOppenlaender, Jonas. 2024a. \u201cA Taxonomy of Prompt Modifiers for Text-to-Image Generation.\u201d Behaviour & Information Technology 43 (15): 3763\u201376. https://doi.org/10.1080/0144929X.2023.2286532.\n\nOppenlaender, Jonas. 2024b. \u201cThe Cultivated Practices of Text-to-Image Generation.\u201d In Humane Autonomous Technology, edited by Rebekah Rousi, Catharina Von Koskull, and Virpi Roto. Springer International Publishing. https://doi.org/10.1007/978-3-031-66528-8_14.\n\nOppenlaender, Jonas, Rhema Linder, and Johanna Silvennoinen. 2024. \u201cPrompting AI Art: An Investigation into the Creative Skill of Prompt Engineering.\u201d arXiv:2303.13534. Preprint, arXiv, July 4. https://doi.org/10.48550/arXiv.2303.13534.\n\nSteyerl, Hito. 2023. \u201cMean Images.\u201d New Left Review, no. 140/141 (April): 82\u201397.\n\nTaplin, Oliver. 1980. \u201cThe Shield of Achilles Within Homer\u2019s Iliad.\u201d Greece and Rome 27, no. 1 : 1\u201321.\n\nWebb, Ruth. 2016. Ekphrasis, Imagination and Persuasion in Ancient Rhetorical Theory and Practice. Routledge.\n\nWebb, Ruth. 1999. \u201cEkphrasis Ancient and Modern: The Invention of a Genre.\u201d Word & Image 15 (1): 7\u201318. https://doi.org/10.1080/02666286.1999.10443970.\n\nZhang, Yifan, Yang Yuan, and Andrew Chi-Chih Yao. 2025. \u201cMeta Prompting for AI Systems.\u201d arXiv:2311.11482. Preprint, arXiv, December 18. https://doi.org/10.48550/arXiv.2311.11482.\n\nZhao, Yiqin, Yu Shen, Stefano Petrangeli, Matheus Gadelha, Cuong Nguyen, and Gang Wu. 2024. \u201cCopiloting Creative 3D Scene Modeling and Visualization with Generative Agents.\u201d Paper presented at 38th Conference on Neural Information Processing Systems. NeurIPS 2024.\n\n\n\n\n";
