<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Debug</title></head>
<body>
<h2>RAW MD:</h2>
<pre id="raw" style="background:#eee;padding:12px;font-size:11px;white-space:pre-wrap;max-height:300px;overflow:auto"></pre>
<h2>RENDERED HTML SOURCE:</h2>
<pre id="source" style="background:#fdd;padding:12px;font-size:11px;white-space:pre-wrap;max-height:400px;overflow:auto"></pre>
<h2>RENDERED OUTPUT:</h2>
<div id="output" style="border:2px solid #333;padding:20px;font-family:Georgia;font-size:16px;line-height:1.6"></div>
<script>
async function test() {
  const res = await fetch('concepts/concept-pictorial-third.md');
  const md = await res.text();
  document.getElementById('raw').textContent = md;

  // Mini version of the renderer from worldtext-reader.html
  let html = md;
  
  // Step 1: protect code blocks
  const codeBlocks = [];
  html = html.replace(/```[\s\S]*?```/g, m => {
    const inner = m.replace(/^```[^\n]*\n?/, '').replace(/```$/, '');
    codeBlocks.push('<pre><code>' + esc(inner) + '</code></pre>');
    return '\x00CODE' + (codeBlocks.length-1) + '\x00';
  });
  const inlines = [];
  html = html.replace(/`([^`]+)`/g, (_, c) => {
    inlines.push('<code>' + esc(c) + '</code>');
    return '\x00INL' + (inlines.length-1) + '\x00';
  });

  // Step 2: Wiki-links
  html = html.replace(/\[\[([^\]]+)\]\]/g, (_, inner) => {
    return '<a class="wl" href="#">↗ ' + inner + '</a>';
  });

  // Step 3: Escape remaining HTML  ← THIS IS THE PROBLEM AREA
  html = html.replace(/&(?!amp;|lt;|gt;|#)/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // The issue: after wiki-links have been converted to <a> tags,
  // the HTML escape step DESTROYS them by converting < to &lt;

  document.getElementById('source').textContent = html;
  document.getElementById('output').innerHTML = '<p style="color:red;font-weight:bold;">SEE SOURCE ABOVE — the HTML tags from wiki-links get escaped!</p>';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
test();
</script>
</body>
</html>
